<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM калькулятор баллов</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: transparent;
      color: #111827;
    }

    .calculator {
      width: 100%;
      max-width: 460px;
      padding: 20px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 14px;
      background: #fafafa;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    h3 {
      margin: 0 0 12px;
      font-size: 18px;
      line-height: 1.25;
    }

    p {
      margin: 0;
    }

    .section-title {
      margin: 18px 0 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #64748b;
    }

    .rows {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ai-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 96px;
      gap: 10px 12px;
      align-items: center;
    }

    .ai-info {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .ai-name {
      min-width: 0;
      padding: 6px 8px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font: inherit;
      background: #ffffff;
      color: inherit;
    }

    .ai-name.is-static {
      border-color: transparent;
      background: transparent;
      padding: 0;
      font-weight: 500;
    }

    .ai-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      font-size: 12px;
      line-height: 1.2;
      color: #2563eb;
      text-decoration: none;
    }

    .ai-link:hover {
      text-decoration: underline;
    }

    .ai-link-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .ai-link.muted {
      color: #94a3b8;
      text-decoration: none;
      pointer-events: none;
      cursor: default;
    }

    .points-input,
    .ai-name,
    .manual-link-input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font: inherit;
      background: #ffffff;
      color: inherit;
    }

    .points-input:focus,
    .ai-name:focus,
    .manual-link-input:focus {
      outline: 2px solid #93c5fd;
      outline-offset: 1px;
      border-color: #60a5fa;
    }

    .custom-controls {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .custom-controls button,
    .footer-actions button {
      flex: 1 1 0;
    }

    button {
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #ffffff;
      color: inherit;
      font: inherit;
      cursor: pointer;
      transition: background-color 0.15s ease, border-color 0.15s ease;
    }

    button:hover {
      background: #f3f4f6;
      border-color: #94a3b8;
    }

    .remove-btn {
      padding: 6px 8px;
      font-size: 12px;
      color: #b91c1c;
    }

    .link-edit {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }

    .link-edit button {
      flex: 0 0 auto;
      padding: 6px 10px;
      font-size: 12px;
    }

    .link-toggle-btn,
    .link-reset-btn {
      padding: 6px 8px;
      font-size: 12px;
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.35;
      color: #64748b;
    }

    hr {
      margin: 16px 0;
      border: 0;
      border-top: 1px solid #e5e7eb;
    }

    .totals {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .row.total {
      margin-top: 4px;
      font-size: 15px;
    }

    .footer-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .calculator {
        padding: 16px;
      }

      .ai-row {
        grid-template-columns: minmax(0, 1fr) 84px;
      }

      .link-edit,
      .custom-controls,
      .footer-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="calculator" id="llm-calculator">
    <h3>LLM калькулятор баллов</h3>

    <div class="section-title">Основные</div>
    <div class="rows" id="main-rows"></div>

    <div class="section-title">Дополнительно</div>
    <div class="rows" id="extra-rows"></div>

    <div class="section-title">Добавленные ИИ</div>
    <div class="rows" id="custom-rows"></div>

    <div class="custom-controls">
      <button id="add-ai-button" type="button">Добавить ИИ</button>
    </div>

    <p class="hint">
      Любую строку можно переименовать, удалить или перенастроить ссылку вручную. Кнопка сброса внизу возвращает исходный базовый список.
    </p>

    <hr />

    <div class="totals">
      <div class="row">
        <span>Основные:</span>
        <strong id="total-main">210</strong>
      </div>

      <div class="row">
        <span>Дополнительно:</span>
        <strong id="total-extra">55</strong>
      </div>

      <div class="row">
        <span>Добавленные:</span>
        <strong id="total-custom">0</strong>
      </div>

      <div class="row total">
        <span>Всего:</span>
        <strong id="total-all">265</strong>
      </div>
    </div>

    <div class="footer-actions">
      <button id="reset-llm-calculator" type="button">Сбросить к исходным значениям</button>
      <button id="clear-custom-rows" type="button">Удалить добавленные</button>
    </div>
  </div>

  <script>
    (function () {
      const STORAGE_KEY = "llm-calculator-state-v2";

      const officialResources = [
        {
          aliases: ["manus", "manus ai"],
          url: "https://manus.im/"
        },
        {
          aliases: ["openai", "chatgpt"],
          url: "https://openai.com/"
        },
        {
          aliases: ["perplexity", "perplexity ai"],
          url: "https://www.perplexity.ai/"
        },
        {
          aliases: ["claude", "anthropic", "claude ai"],
          url: "https://www.anthropic.com/claude"
        },
        {
          aliases: ["grok", "xai", "x.ai"],
          url: "https://grok.com/"
        },
        {
          aliases: ["subemotion"],
          url: "https://subemotion.com/"
        },
        {
          aliases: ["higgsfield", "higgsfield ai"],
          url: "https://higgsfield.ai/"
        }
      ];

      const defaultRows = {
        main: [
          { id: "manus", name: "Manus", points: 40 },
          { id: "openai", name: "OpenAI", points: 22 },
          { id: "perplexity", name: "Perplexity", points: 20 },
          { id: "claude", name: "Claude", points: 100 },
          { id: "grok", name: "Grok", points: 30 }
        ],
        extra: [
          { id: "subemotion", name: "Subemotion", points: 20 },
          { id: "higgsfield", name: "Higgsfield", points: 35 }
        ],
        custom: []
      };

      let state = loadState();

      function normalizeName(value) {
        return String(value).trim().toLowerCase();
      }

      function safeNumber(value) {
        const n = Number(value);
        return Number.isNaN(n) ? 0 : n;
      }

      function cloneDefaultRows() {
        return {
          main: defaultRows.main.map((item) => ({ ...item })),
          extra: defaultRows.extra.map((item) => ({ ...item })),
          custom: []
        };
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            return cloneDefaultRows();
          }

          const parsed = JSON.parse(raw);
          return {
            main: Array.isArray(parsed.main) ? parsed.main : cloneDefaultRows().main,
            extra: Array.isArray(parsed.extra) ? parsed.extra : cloneDefaultRows().extra,
            custom: Array.isArray(parsed.custom) ? parsed.custom : []
          };
        } catch (_error) {
          return cloneDefaultRows();
        }
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function getOfficialUrl(name) {
        const normalized = normalizeName(name);

        for (const resource of officialResources) {
          if (resource.aliases.some((alias) => normalized === alias || normalized.includes(alias))) {
            return resource.url;
          }
        }

        return "";
      }

      function getRowLink(row) {
        return row.manualUrl || getOfficialUrl(row.name);
      }

      function createLinkElement(row) {
        const link = document.createElement("a");
        const href = getRowLink(row);

        link.className = "ai-link";
        link.target = "_blank";
        link.rel = "noreferrer noopener";

        if (href) {
          link.href = href;
          link.textContent = "Официальный сайт";
        } else {
          link.removeAttribute("href");
          link.classList.add("muted");
          link.textContent = "Ссылка не распознана";
        }

        return link;
      }

      function createManualLinkEditor(row, onChange) {
        const wrapper = document.createElement("div");
        wrapper.className = "link-edit";

        const input = document.createElement("input");
        input.className = "manual-link-input";
        input.type = "url";
        input.placeholder = "Вставь официальный URL вручную";
        input.value = row.manualUrl || "";

        const saveButton = document.createElement("button");
        saveButton.type = "button";
        saveButton.textContent = "Сохранить";

        saveButton.addEventListener("click", function () {
          row.manualUrl = input.value.trim();
          row.isEditingLink = false;
          onChange();
        });

        const cancelButton = document.createElement("button");
        cancelButton.type = "button";
        cancelButton.textContent = "Отмена";
        cancelButton.addEventListener("click", function () {
          row.isEditingLink = false;
          onChange();
        });

        const resetButton = document.createElement("button");
        resetButton.type = "button";
        resetButton.className = "link-reset-btn";
        resetButton.textContent = "Авто";
        resetButton.addEventListener("click", function () {
          row.manualUrl = "";
          row.isEditingLink = false;
          onChange();
        });

        wrapper.appendChild(input);
        wrapper.appendChild(saveButton);
        wrapper.appendChild(cancelButton);
        wrapper.appendChild(resetButton);

        return wrapper;
      }

      function createPointsInput(row, onChange) {
        const input = document.createElement("input");
        input.className = "points-input";
        input.type = "number";
        input.min = "0";
        input.step = "1";
        input.value = safeNumber(row.points);

        input.addEventListener("input", function () {
          row.points = safeNumber(input.value);
          onChange();
        });

        return input;
      }

      function buildLinkBlock(row, options) {
        const fragment = document.createDocumentFragment();

        const linkRow = document.createElement("div");
        linkRow.className = "ai-link-row";
        linkRow.appendChild(createLinkElement(row));

        const editButton = document.createElement("button");
        editButton.type = "button";
        editButton.className = "link-toggle-btn";
        editButton.textContent = row.manualUrl ? "Править ссылку" : "Задать ссылку";
        editButton.addEventListener("click", function () {
          row.isEditingLink = !row.isEditingLink;
          rerender();
        });
        linkRow.appendChild(editButton);

        if (row.manualUrl) {
          const resetButton = document.createElement("button");
          resetButton.type = "button";
          resetButton.className = "link-reset-btn";
          resetButton.textContent = "Сбросить";
          resetButton.addEventListener("click", function () {
            row.manualUrl = "";
            row.isEditingLink = false;
            rerender();
          });
          linkRow.appendChild(resetButton);
        }

        fragment.appendChild(linkRow);

        if (row.isEditingLink || (options.editableName && !getRowLink(row))) {
          fragment.appendChild(createManualLinkEditor(row, rerender));
        }

        if (options.removable) {
          const removeButton = document.createElement("button");
          removeButton.type = "button";
          removeButton.className = "remove-btn";
          removeButton.textContent = "Удалить";
          removeButton.addEventListener("click", function () {
            state[options.sectionName] = state[options.sectionName].filter((entry) => entry.id !== row.id);
            rerender();
          });
          fragment.appendChild(removeButton);
        }

        return fragment;
      }

      function renderSection(sectionName, containerId, options) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";

        state[sectionName].forEach((row) => {
          const item = document.createElement("div");
          item.className = "ai-row";

          const info = document.createElement("div");
          info.className = "ai-info";

          const nameInput = document.createElement("input");
          nameInput.className = "ai-name";
          nameInput.type = "text";
          nameInput.placeholder = "Название ИИ";
          nameInput.value = row.name || "";

          const linkArea = document.createElement("div");

          nameInput.addEventListener("input", function () {
            row.name = nameInput.value;
            saveState();
            linkArea.innerHTML = "";
            linkArea.appendChild(buildLinkBlock(row, { ...options, sectionName }));
          });

          info.appendChild(nameInput);
          info.appendChild(linkArea);
          linkArea.appendChild(buildLinkBlock(row, { ...options, sectionName }));

          item.appendChild(info);
          item.appendChild(createPointsInput(row, function () {
            saveState();
            updateTotals();
          }));
          container.appendChild(item);
        });
      }

      function updateTotals() {
        const totalMain = state.main.reduce((sum, row) => sum + safeNumber(row.points), 0);
        const totalExtra = state.extra.reduce((sum, row) => sum + safeNumber(row.points), 0);
        const totalCustom = state.custom.reduce((sum, row) => sum + safeNumber(row.points), 0);

        document.getElementById("total-main").textContent = totalMain;
        document.getElementById("total-extra").textContent = totalExtra;
        document.getElementById("total-custom").textContent = totalCustom;
        document.getElementById("total-all").textContent = totalMain + totalExtra + totalCustom;
      }

      function rerender() {
        saveState();
        renderSection("main", "main-rows", { editableName: true, removable: true });
        renderSection("extra", "extra-rows", { editableName: true, removable: true });
        renderSection("custom", "custom-rows", { editableName: true, removable: true });
        updateTotals();
      }

      function addCustomRow() {
        const nextIndex = state.custom.length + 1;
        state.custom.push({
          id: "custom-" + Date.now() + "-" + nextIndex,
          name: "",
          points: 0,
          manualUrl: ""
        });
        rerender();
      }

      function resetCalculator() {
        state = cloneDefaultRows();
        rerender();
      }

      function clearCustomRows() {
        state.custom = [];
        rerender();
      }

      document.getElementById("add-ai-button").addEventListener("click", addCustomRow);
      document.getElementById("reset-llm-calculator").addEventListener("click", resetCalculator);
      document.getElementById("clear-custom-rows").addEventListener("click", clearCustomRows);

      rerender();
    })();
  </script>
</body>
</html>
